---
title: "المحرر"
layout: default
sitemap: false
---

<style>
/* Override site max-width for full-width editor */
body { max-width: 100% !important; }
main#main-content { padding: 0 !important; }

.editor-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* Toolbar */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  background: #111113;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  user-select: none;
  overflow-x: auto;
}
.toolbar-group {
  display: flex;
  gap: 2px;
  padding-inline-end: 8px;
  border-inline-end: 1px solid rgba(255,255,255,0.06);
}
.toolbar-group:last-child {
  border-inline-end: none;
  margin-inline-start: auto;
}
.editor-toolbar button {
  background: transparent;
  border: none;
  color: #8a8a8e;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  font-size: 0.8em;
  font-weight: 600;
  line-height: 1;
  min-width: 32px;
  white-space: nowrap;
}
.editor-toolbar button:hover {
  background: rgba(255,255,255,0.06);
  color: #ededef;
}
.editor-toolbar button:active {
  background: rgba(255,255,255,0.10);
}
.editor-toolbar button svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Mobile tab toggle */
.mobile-tabs {
  display: none;
  background: #111113;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.mobile-tabs button {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: #8a8a8e;
  font-family: inherit;
  font-size: 0.85em;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.mobile-tabs button.active {
  color: #ededef;
  border-bottom-color: #6366f1;
}

/* Split panes */
.editor-panes {
  display: flex;
  flex: 1;
  min-height: 0;
}
.editor-input-pane,
.editor-preview-pane {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.pane-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 16px;
  background: #1a1a1e;
  font-size: 0.75em;
  color: #5a5a5e;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  user-select: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.autosave-indicator {
  color: #6366f1;
  opacity: 0;
  transition: opacity 0.3s;
  text-transform: none;
  letter-spacing: 0;
}
.autosave-indicator.visible { opacity: 1; }

/* Textarea */
#md-input {
  flex: 1;
  background: #0a0a0b;
  color: #ededef;
  border: none;
  resize: none;
  padding: 20px;
  font-family: "Cairo", "Courier New", monospace;
  font-size: 0.95em;
  line-height: 1.8;
  direction: rtl;
  outline: none;
  tab-size: 2;
}
#md-input::placeholder {
  color: #5a5a5e;
}

/* Resize handle */
.editor-resize-handle {
  width: 4px;
  cursor: col-resize;
  background: rgba(255,255,255,0.06);
  transition: background 0.2s;
  flex-shrink: 0;
}
.editor-resize-handle:hover,
.editor-resize-handle.dragging {
  background: #6366f1;
}

/* Preview */
.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  direction: rtl;
  line-height: 1.7;
  background: #0a0a0b;
  border-inline-start: 1px solid rgba(255,255,255,0.06);
}
.preview-content h1 { font-size: 1.8em; font-weight: 700; margin: 0.8em 0 0.4em; color: #ededef; }
.preview-content h2 { font-size: 1.4em; font-weight: 700; margin: 0.8em 0 0.4em; color: #ededef; }
.preview-content h3 { font-size: 1.15em; font-weight: 600; margin: 0.6em 0 0.3em; color: #ededef; }
.preview-content p { margin: 0.6em 0; color: #ededef; }
.preview-content a { color: #6366f1; text-decoration: none; }
.preview-content a:hover { text-decoration: underline; }
.preview-content code {
  background: #1e1e22;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
  font-family: "Courier New", monospace;
}
.preview-content pre {
  background: #111113;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 1em 0;
}
.preview-content pre code {
  background: none;
  padding: 0;
}
.preview-content blockquote {
  border-inline-start: 3px solid #6366f1;
  padding: 0.5em 1em;
  margin: 1em 0;
  background: rgba(99,102,241,0.05);
  border-radius: 0 8px 8px 0;
  color: #8a8a8e;
}
.preview-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
}
.preview-content th, .preview-content td {
  border: 1px solid rgba(255,255,255,0.10);
  padding: 8px 12px;
  text-align: right;
}
.preview-content th {
  background: #111113;
  font-weight: 600;
}
.preview-content img {
  max-width: 100%;
  border-radius: 8px;
}
.preview-content hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.10);
  margin: 1.5em 0;
}
.preview-content ul, .preview-content ol {
  padding-inline-start: 1.5em;
  margin: 0.5em 0;
}
.preview-content li { margin: 0.3em 0; }

/* Empty state */
.preview-empty {
  color: #5a5a5e;
  text-align: center;
  margin-top: 30vh;
  font-size: 0.9em;
}

/* Toast notification */
.editor-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e1e22;
  color: #ededef;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.10);
  font-size: 0.85em;
  font-family: inherit;
  z-index: 100;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.editor-toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* Mobile */
@media (max-width: 768px) {
  .mobile-tabs { display: flex; }
  .editor-resize-handle { display: none; }
  .editor-panes { flex-direction: column; }
  .editor-input-pane.hidden,
  .editor-preview-pane.hidden { display: none; }
  .preview-content { border-inline-start: none; border-top: 1px solid rgba(255,255,255,0.06); }
  .toolbar-group:last-child { margin-inline-start: 0; }
}
</style>

<div class="editor-container">
  <!-- Toolbar -->
  <div class="editor-toolbar">
    <div class="toolbar-group">
      <button data-action="h1" title="عنوان 1">H1</button>
      <button data-action="h2" title="عنوان 2">H2</button>
      <button data-action="h3" title="عنوان 3">H3</button>
    </div>
    <div class="toolbar-group">
      <button data-action="bold" title="عريض (Ctrl+B)"><svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 0 8H6zM6 12h9a4 4 0 0 1 0 8H6z"/></svg></button>
      <button data-action="italic" title="مائل (Ctrl+I)"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
      <button data-action="strike" title="شطب"><svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/><path d="M17.3 4.9c-.5-.4-1.3-.9-2.7-.9-2.5 0-3.8 1.7-3.8 3 0 2.1 1.6 2.8 3.5 3.5"/><path d="M8.3 15.1c0 2 1.5 3.9 4.1 3.9 1.3 0 2.5-.5 3.2-1.3"/></svg></button>
      <button data-action="code" title="كود (Ctrl+E)"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
    </div>
    <div class="toolbar-group">
      <button data-action="link" title="رابط (Ctrl+K)"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7.1-7.1l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7.1 7.1l1.7-1.7"/></svg></button>
      <button data-action="image" title="صورة"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
    </div>
    <div class="toolbar-group">
      <button data-action="ul" title="قائمة"><svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg></button>
      <button data-action="ol" title="قائمة مرقمة"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="1" y="8" font-size="8" fill="currentColor" stroke="none">1</text><text x="1" y="14" font-size="8" fill="currentColor" stroke="none">2</text><text x="1" y="20" font-size="8" fill="currentColor" stroke="none">3</text></svg></button>
      <button data-action="quote" title="اقتباس"><svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.76-2.02-2-2H5c-1.25 0-2 .76-2 2v6c0 1.25.76 2 2 2h2c.85 0 1.14.27 1.14 1C8 17 5 19 3 21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.76-2.02-2-2h-3c-1.25 0-2 .76-2 2v6c0 1.25.76 2 2 2h2c.85 0 1.14.27 1.14 1C20 17 17 19 15 21z"/></svg></button>
      <button data-action="table" title="جدول"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
      <button data-action="hr" title="فاصل">—</button>
    </div>
    <div class="toolbar-group">
      <button data-action="import" title="استيراد ملف"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button data-action="export-md" title="تصدير (Ctrl+S)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
      <button data-action="copy-md" title="نسخ Markdown">MD</button>
      <button data-action="copy-html" title="نسخ HTML">HTML</button>
    </div>
  </div>

  <!-- Mobile tabs -->
  <div class="mobile-tabs">
    <button id="tab-editor" class="active" onclick="switchTab('editor')">المحرر</button>
    <button id="tab-preview" onclick="switchTab('preview')">المعاينة</button>
  </div>

  <!-- Split Panes -->
  <div class="editor-panes">
    <div class="editor-input-pane" id="input-pane">
      <div class="pane-header">
        <span>MARKDOWN</span>
        <span class="autosave-indicator" id="autosave-indicator">تم الحفظ</span>
      </div>
      <textarea id="md-input" dir="rtl" spellcheck="true" placeholder="ابدأ الكتابة هنا..."></textarea>
    </div>

    <div class="editor-resize-handle" id="resize-handle"></div>

    <div class="editor-preview-pane" id="preview-pane">
      <div class="pane-header"><span>PREVIEW</span></div>
      <div id="md-preview" class="preview-content" dir="rtl">
        <div class="preview-empty">المعاينة ستظهر هنا</div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-import" accept=".md,.txt,.markdown" hidden>

<!-- Toast -->
<div class="editor-toast" id="editor-toast"></div>

<!-- Markdown parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>

<script>
(function() {
  // DOM refs
  var input = document.getElementById('md-input');
  var preview = document.getElementById('md-preview');
  var saveIndicator = document.getElementById('autosave-indicator');
  var fileInput = document.getElementById('file-import');
  var toast = document.getElementById('editor-toast');
  var handle = document.getElementById('resize-handle');
  var inputPane = document.getElementById('input-pane');
  var previewPane = document.getElementById('preview-pane');
  var STORAGE_KEY = 'roko-editor-content';
  var debounceTimer, saveTimer;

  // Configure marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({ gfm: true, breaks: true });
  }

  // === Preview ===
  function renderPreview() {
    if (typeof marked === 'undefined') {
      preview.innerHTML = '<div class="preview-empty">تعذر تحميل محرك المعاينة</div>';
      return;
    }
    var val = input.value.trim();
    if (!val) {
      preview.innerHTML = '<div class="preview-empty">المعاينة ستظهر هنا</div>';
      return;
    }
    preview.innerHTML = marked.parse(val);
  }

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      renderPreview();
      scheduleAutoSave();
    }, 150);
  });

  // === Auto-save ===
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveContent, 1000);
  }

  function saveContent() {
    try {
      localStorage.setItem(STORAGE_KEY, input.value);
      saveIndicator.classList.add('visible');
      setTimeout(function() { saveIndicator.classList.remove('visible'); }, 2000);
    } catch(e) {}
  }

  function loadContent() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      input.value = saved;
      renderPreview();
    }
  }

  window.addEventListener('beforeunload', function() {
    if (input.value) localStorage.setItem(STORAGE_KEY, input.value);
  });

  // === Toast ===
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(function() { toast.classList.remove('visible'); }, 2000);
  }

  // === Toolbar helpers ===
  function wrapSelection(before, after) {
    var start = input.selectionStart;
    var end = input.selectionEnd;
    var text = input.value;
    var selected = text.substring(start, end) || 'نص';
    input.value = text.substring(0, start) + before + selected + after + text.substring(end);
    input.selectionStart = start + before.length;
    input.selectionEnd = start + before.length + selected.length;
    input.focus();
  }

  function prefixLine(prefix) {
    var start = input.selectionStart;
    var text = input.value;
    var lineStart = text.lastIndexOf('\n', start - 1) + 1;
    var lineEnd = text.indexOf('\n', start);
    if (lineEnd === -1) lineEnd = text.length;
    var line = text.substring(lineStart, lineEnd);
    if (line.startsWith(prefix)) {
      input.value = text.substring(0, lineStart) + line.substring(prefix.length) + text.substring(lineEnd);
    } else {
      // Remove other heading prefixes if adding heading
      var cleaned = line.replace(/^#{1,6}\s/, '');
      input.value = text.substring(0, lineStart) + prefix + cleaned + text.substring(lineEnd);
    }
    input.focus();
  }

  function prefixLines(prefix) {
    var start = input.selectionStart;
    var end = input.selectionEnd;
    var text = input.value;
    var lineStart = text.lastIndexOf('\n', start - 1) + 1;
    var lineEnd = text.indexOf('\n', end - 1);
    if (lineEnd === -1) lineEnd = text.length;
    var block = text.substring(lineStart, lineEnd);
    var lines = block.split('\n');
    var result = lines.map(function(line, i) {
      if (prefix === '1. ') return (i + 1) + '. ' + line;
      return prefix + line;
    }).join('\n');
    input.value = text.substring(0, lineStart) + result + text.substring(lineEnd);
    input.focus();
  }

  function insertAtCursor(str) {
    var start = input.selectionStart;
    var text = input.value;
    input.value = text.substring(0, start) + str + text.substring(start);
    input.selectionStart = input.selectionEnd = start + str.length;
    input.focus();
  }

  // === Actions ===
  function handleAction(action) {
    switch(action) {
      case 'h1': prefixLine('# '); break;
      case 'h2': prefixLine('## '); break;
      case 'h3': prefixLine('### '); break;
      case 'bold': wrapSelection('**', '**'); break;
      case 'italic': wrapSelection('*', '*'); break;
      case 'strike': wrapSelection('~~', '~~'); break;
      case 'code': wrapSelection('`', '`'); break;
      case 'link':
        var url = prompt('أدخل الرابط:');
        if (url) {
          var s = input.selectionStart, e = input.selectionEnd;
          var sel = input.value.substring(s, e) || 'رابط';
          input.value = input.value.substring(0, s) + '[' + sel + '](' + url + ')' + input.value.substring(e);
          input.focus();
        }
        break;
      case 'image':
        var imgUrl = prompt('أدخل رابط الصورة:');
        if (imgUrl) insertAtCursor('![صورة](' + imgUrl + ')');
        break;
      case 'ul': prefixLines('- '); break;
      case 'ol': prefixLines('1. '); break;
      case 'quote': prefixLines('> '); break;
      case 'table':
        insertAtCursor('\n| العمود 1 | العمود 2 | العمود 3 |\n| --- | --- | --- |\n| خلية | خلية | خلية |\n');
        break;
      case 'hr': insertAtCursor('\n---\n'); break;
      case 'import': fileInput.click(); break;
      case 'export-md': exportMarkdown(); break;
      case 'copy-md':
        navigator.clipboard.writeText(input.value).then(function() { showToast('تم نسخ Markdown'); });
        break;
      case 'copy-html':
        if (typeof marked !== 'undefined') {
          navigator.clipboard.writeText(marked.parse(input.value)).then(function() { showToast('تم نسخ HTML'); });
        }
        break;
    }
    renderPreview();
    scheduleAutoSave();
  }

  // Toolbar click delegation
  document.querySelector('.editor-toolbar').addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-action]');
    if (btn) handleAction(btn.dataset.action);
  });

  // === Keyboard shortcuts ===
  input.addEventListener('keydown', function(e) {
    var ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 'b') { e.preventDefault(); handleAction('bold'); }
    else if (ctrl && e.key === 'i') { e.preventDefault(); handleAction('italic'); }
    else if (ctrl && e.key === 'k') { e.preventDefault(); handleAction('link'); }
    else if (ctrl && e.key === 'e') { e.preventDefault(); handleAction('code'); }
    else if (ctrl && e.key === 's') { e.preventDefault(); handleAction('export-md'); }
    else if (ctrl && e.shiftKey && (e.key === 'x' || e.key === 'X')) { e.preventDefault(); handleAction('strike'); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      insertAtCursor('  ');
      renderPreview();
      scheduleAutoSave();
    }
  });

  // === File import ===
  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      input.value = ev.target.result;
      renderPreview();
      saveContent();
      showToast('تم استيراد: ' + file.name);
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // === Export ===
  function exportMarkdown() {
    var blob = new Blob([input.value], { type: 'text/markdown;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'document.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('تم تصدير الملف');
  }

  // === Resize handle ===
  var dragging = false;
  handle.addEventListener('mousedown', function(e) {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var container = document.querySelector('.editor-panes');
    var rect = container.getBoundingClientRect();
    var offset = rect.right - e.clientX;
    var percent = (offset / rect.width) * 100;
    percent = Math.max(20, Math.min(80, percent));
    inputPane.style.flex = 'none';
    inputPane.style.width = percent + '%';
    previewPane.style.flex = 'none';
    previewPane.style.width = (100 - percent) + '%';
  });
  document.addEventListener('mouseup', function() {
    if (dragging) {
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // === Mobile tabs ===
  window.switchTab = function(tab) {
    document.getElementById('tab-editor').classList.toggle('active', tab === 'editor');
    document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
    inputPane.classList.toggle('hidden', tab !== 'editor');
    previewPane.classList.toggle('hidden', tab !== 'preview');
    if (tab === 'preview') renderPreview();
  };

  // === Init ===
  loadContent();
})();
</script>
