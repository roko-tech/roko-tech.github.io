---
title: "المحرر"
layout: default
sitemap: false
---

<style>
/* Override site max-width for full-width editor */
body { max-width: 100% !important; }
main#main-content { padding: 0 !important; }

.editor-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* Toolbar */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  background: #111113;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  user-select: none;
  overflow-x: auto;
}
.toolbar-group {
  display: flex;
  gap: 2px;
  padding-inline-end: 8px;
  border-inline-end: 1px solid rgba(255,255,255,0.06);
}
.toolbar-group:last-child {
  border-inline-end: none;
  margin-inline-start: auto;
}
.editor-toolbar button {
  background: transparent;
  border: none;
  color: #8a8a8e;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  font-size: 0.8em;
  font-weight: 600;
  line-height: 1;
  min-width: 32px;
  white-space: nowrap;
}
.editor-toolbar button:hover {
  background: rgba(255,255,255,0.06);
  color: #ededef;
}
.editor-toolbar button:active {
  background: rgba(255,255,255,0.10);
}
.editor-toolbar button svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Mobile tab toggle */
.mobile-tabs {
  display: none;
  background: #111113;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.mobile-tabs button {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: #8a8a8e;
  font-family: inherit;
  font-size: 0.85em;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.mobile-tabs button.active {
  color: #ededef;
  border-bottom-color: #6366f1;
}

/* Split panes */
.editor-panes {
  display: flex;
  flex: 1;
  min-height: 0;
}
.editor-input-pane,
.editor-preview-pane {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.pane-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 16px;
  background: #1a1a1e;
  font-size: 0.75em;
  color: #5a5a5e;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  user-select: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.autosave-indicator {
  color: #6366f1;
  opacity: 0;
  transition: opacity 0.3s;
  text-transform: none;
  letter-spacing: 0;
}
.autosave-indicator.visible { opacity: 1; }

/* Textarea */
#md-input {
  flex: 1;
  background: #0a0a0b;
  color: #ededef;
  border: none;
  resize: none;
  padding: 20px;
  font-family: "Cairo", "Courier New", monospace;
  font-size: 0.95em;
  line-height: 1.8;
  direction: rtl;
  outline: none;
  tab-size: 2;
}
#md-input::placeholder {
  color: #5a5a5e;
}

/* Resize handle */
.editor-resize-handle {
  width: 4px;
  cursor: col-resize;
  background: rgba(255,255,255,0.06);
  transition: background 0.2s;
  flex-shrink: 0;
}
.editor-resize-handle:hover,
.editor-resize-handle.dragging {
  background: #6366f1;
}

/* Preview */
.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  direction: rtl;
  line-height: 1.7;
  background: #0a0a0b;
  border-inline-start: 1px solid rgba(255,255,255,0.06);
}
.preview-content h1 { font-size: 1.8em; font-weight: 700; margin: 0.8em 0 0.4em; color: #ededef; }
.preview-content h2 { font-size: 1.4em; font-weight: 700; margin: 0.8em 0 0.4em; color: #ededef; }
.preview-content h3 { font-size: 1.15em; font-weight: 600; margin: 0.6em 0 0.3em; color: #ededef; }
.preview-content p { margin: 0.6em 0; color: #ededef; }
.preview-content a { color: #6366f1; text-decoration: none; }
.preview-content a:hover { text-decoration: underline; }
.preview-content code {
  background: #1e1e22;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
  font-family: "Courier New", monospace;
}
.preview-content pre {
  background: #111113;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 1em 0;
}
.preview-content pre code {
  background: none;
  padding: 0;
}
.preview-content blockquote {
  border-inline-start: 3px solid #6366f1;
  padding: 0.5em 1em;
  margin: 1em 0;
  background: rgba(99,102,241,0.05);
  border-radius: 0 8px 8px 0;
  color: #8a8a8e;
}
.preview-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
}
.preview-content th, .preview-content td {
  border: 1px solid rgba(255,255,255,0.10);
  padding: 8px 12px;
  text-align: right;
}
.preview-content th {
  background: #111113;
  font-weight: 600;
}
.preview-content img {
  max-width: 100%;
  border-radius: 8px;
}
.preview-content hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.10);
  margin: 1.5em 0;
}
.preview-content ul, .preview-content ol {
  padding-inline-start: 1.5em;
  margin: 0.5em 0;
}
.preview-content li { margin: 0.3em 0; }

/* Empty state */
.preview-empty {
  color: #5a5a5e;
  text-align: center;
  margin-top: 30vh;
  font-size: 0.9em;
}

/* Toast notification */
.editor-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e1e22;
  color: #ededef;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.10);
  font-size: 0.85em;
  font-family: inherit;
  z-index: 100;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.editor-toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* Publish button */
.btn-publish {
  background: #6366f1 !important;
  color: #fff !important;
  padding: 6px 14px !important;
  border-radius: 6px !important;
  gap: 6px;
}
.btn-publish:hover {
  background: #818cf8 !important;
}
.btn-settings {
  color: #5a5a5e !important;
}
.btn-settings:hover {
  color: #8a8a8e !important;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #111113;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  width: 90%;
  max-width: 480px;
  padding: 24px;
  direction: rtl;
}
.modal h3 {
  margin: 0 0 20px;
  font-size: 1.1em;
  color: #ededef;
}
.modal label {
  display: block;
  font-size: 0.8em;
  color: #8a8a8e;
  margin-bottom: 6px;
}
.modal input, .modal textarea {
  width: 100%;
  background: #0a0a0b;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 8px;
  padding: 10px 12px;
  color: #ededef;
  font-family: inherit;
  font-size: 0.9em;
  margin-bottom: 16px;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.modal input:focus, .modal textarea:focus {
  border-color: #6366f1;
}
.modal textarea { resize: vertical; min-height: 60px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  margin-top: 8px;
}
.modal-actions button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-family: inherit;
  font-size: 0.9em;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-primary {
  background: #6366f1;
  color: #fff;
}
.btn-primary:hover { background: #818cf8; }
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn-secondary {
  background: #1e1e22;
  color: #8a8a8e;
}
.btn-secondary:hover { background: #2a2a2e; }

/* Token status */
.token-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75em;
  margin-bottom: 16px;
  padding: 8px 12px;
  border-radius: 8px;
  background: #0a0a0b;
}
.token-status.connected { color: #22c55e; }
.token-status.disconnected { color: #ef4444; }
.token-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.token-remove {
  margin-inline-start: auto;
  background: none;
  border: none;
  color: #ef4444;
  cursor: pointer;
  font-size: 0.9em;
  padding: 2px 8px;
}
.token-remove:hover { text-decoration: underline; }
.token-help {
  font-size: 0.75em;
  color: #5a5a5e;
  margin-bottom: 16px;
  line-height: 1.6;
}
.token-help a {
  color: #6366f1;
  text-decoration: none;
}
.token-help a:hover { text-decoration: underline; }

/* Mobile */
@media (max-width: 768px) {
  .mobile-tabs { display: flex; }
  .editor-resize-handle { display: none; }
  .editor-panes { flex-direction: column; }
  .editor-input-pane.hidden,
  .editor-preview-pane.hidden { display: none; }
  .preview-content { border-inline-start: none; border-top: 1px solid rgba(255,255,255,0.06); }
  .toolbar-group:last-child { margin-inline-start: 0; }
}
</style>

<!-- Markdown parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>

<script>
(function() {
  // DOM refs
  var input = document.getElementById('md-input');
  var preview = document.getElementById('md-preview');
  var saveIndicator = document.getElementById('autosave-indicator');
  var fileInput = document.getElementById('file-import');
  var toast = document.getElementById('editor-toast');
  var handle = document.getElementById('resize-handle');
  var inputPane = document.getElementById('input-pane');
  var previewPane = document.getElementById('preview-pane');
  var STORAGE_KEY = 'roko-editor-content';
  var debounceTimer, saveTimer;

  // Configure marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({ gfm: true, breaks: true });
  }

  // === Preview ===
  function renderPreview() {
    if (typeof marked === 'undefined') {
      preview.innerHTML = '<div class="preview-empty">تعذر تحميل محرك المعاينة</div>';
      return;
    }
    var val = input.value.trim();
    if (!val) {
      preview.innerHTML = '<div class="preview-empty">المعاينة ستظهر هنا</div>';
      return;
    }
    preview.innerHTML = marked.parse(val);
  }

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      renderPreview();
      scheduleAutoSave();
    }, 150);
  });

  // === Auto-save ===
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveContent, 1000);
  }

  function saveContent() {
    try {
      localStorage.setItem(STORAGE_KEY, input.value);
      saveIndicator.classList.add('visible');
      setTimeout(function() { saveIndicator.classList.remove('visible'); }, 2000);
    } catch(e) {}
  }

  function loadContent() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      input.value = saved;
      renderPreview();
    }
  }

  window.addEventListener('beforeunload', function() {
    if (input.value) localStorage.setItem(STORAGE_KEY, input.value);
  });

  // === Toast ===
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(function() { toast.classList.remove('visible'); }, 2000);
  }

  // === Toolbar helpers ===
  function wrapSelection(before, after) {
    var start = input.selectionStart;
    var end = input.selectionEnd;
    var text = input.value;
    var selected = text.substring(start, end) || 'نص';
    input.value = text.substring(0, start) + before + selected + after + text.substring(end);
    input.selectionStart = start + before.length;
    input.selectionEnd = start + before.length + selected.length;
    input.focus();
  }

  function prefixLine(prefix) {
    var start = input.selectionStart;
    var text = input.value;
    var lineStart = text.lastIndexOf('\n', start - 1) + 1;
    var lineEnd = text.indexOf('\n', start);
    if (lineEnd === -1) lineEnd = text.length;
    var line = text.substring(lineStart, lineEnd);
    if (line.startsWith(prefix)) {
      input.value = text.substring(0, lineStart) + line.substring(prefix.length) + text.substring(lineEnd);
    } else {
      // Remove other heading prefixes if adding heading
      var cleaned = line.replace(/^#{1,6}\s/, '');
      input.value = text.substring(0, lineStart) + prefix + cleaned + text.substring(lineEnd);
    }
    input.focus();
  }

  function prefixLines(prefix) {
    var start = input.selectionStart;
    var end = input.selectionEnd;
    var text = input.value;
    var lineStart = text.lastIndexOf('\n', start - 1) + 1;
    var lineEnd = text.indexOf('\n', end - 1);
    if (lineEnd === -1) lineEnd = text.length;
    var block = text.substring(lineStart, lineEnd);
    var lines = block.split('\n');
    var result = lines.map(function(line, i) {
      if (prefix === '1. ') return (i + 1) + '. ' + line;
      return prefix + line;
    }).join('\n');
    input.value = text.substring(0, lineStart) + result + text.substring(lineEnd);
    input.focus();
  }

  function insertAtCursor(str) {
    var start = input.selectionStart;
    var text = input.value;
    input.value = text.substring(0, start) + str + text.substring(start);
    input.selectionStart = input.selectionEnd = start + str.length;
    input.focus();
  }

  // === Actions ===
  function handleAction(action) {
    switch(action) {
      case 'h1': prefixLine('# '); break;
      case 'h2': prefixLine('## '); break;
      case 'h3': prefixLine('### '); break;
      case 'bold': wrapSelection('**', '**'); break;
      case 'italic': wrapSelection('*', '*'); break;
      case 'strike': wrapSelection('~~', '~~'); break;
      case 'code': wrapSelection('`', '`'); break;
      case 'link':
        var url = prompt('أدخل الرابط:');
        if (url) {
          var s = input.selectionStart, e = input.selectionEnd;
          var sel = input.value.substring(s, e) || 'رابط';
          input.value = input.value.substring(0, s) + '[' + sel + '](' + url + ')' + input.value.substring(e);
          input.focus();
        }
        break;
      case 'image':
        var imgUrl = prompt('أدخل رابط الصورة:');
        if (imgUrl) insertAtCursor('![صورة](' + imgUrl + ')');
        break;
      case 'ul': prefixLines('- '); break;
      case 'ol': prefixLines('1. '); break;
      case 'quote': prefixLines('> '); break;
      case 'table':
        insertAtCursor('\n| العمود 1 | العمود 2 | العمود 3 |\n| --- | --- | --- |\n| خلية | خلية | خلية |\n');
        break;
      case 'hr': insertAtCursor('\n---\n'); break;
      case 'import': fileInput.click(); break;
      case 'export-md': exportMarkdown(); break;
      case 'publish': openPublishModal(); break;
      case 'settings': openModal('settings-modal'); updateTokenStatus(); break;
      case 'copy-md':
        navigator.clipboard.writeText(input.value).then(function() { showToast('تم نسخ Markdown'); });
        break;
      case 'copy-html':
        if (typeof marked !== 'undefined') {
          navigator.clipboard.writeText(marked.parse(input.value)).then(function() { showToast('تم نسخ HTML'); });
        }
        break;
    }
    renderPreview();
    scheduleAutoSave();
  }

  // Toolbar click delegation
  document.querySelector('.editor-toolbar').addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-action]');
    if (btn) handleAction(btn.dataset.action);
  });

  // === Keyboard shortcuts ===
  input.addEventListener('keydown', function(e) {
    var ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 'b') { e.preventDefault(); handleAction('bold'); }
    else if (ctrl && e.key === 'i') { e.preventDefault(); handleAction('italic'); }
    else if (ctrl && e.key === 'k') { e.preventDefault(); handleAction('link'); }
    else if (ctrl && e.key === 'e') { e.preventDefault(); handleAction('code'); }
    else if (ctrl && e.key === 's') { e.preventDefault(); handleAction('export-md'); }
    else if (ctrl && e.shiftKey && (e.key === 'x' || e.key === 'X')) { e.preventDefault(); handleAction('strike'); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      insertAtCursor('  ');
      renderPreview();
      scheduleAutoSave();
    }
  });

  // === File import ===
  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      input.value = ev.target.result;
      renderPreview();
      saveContent();
      showToast('تم استيراد: ' + file.name);
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // === Export ===
  function exportMarkdown() {
    var blob = new Blob([input.value], { type: 'text/markdown;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'document.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('تم تصدير الملف');
  }

  // === Resize handle ===
  var dragging = false;
  handle.addEventListener('mousedown', function(e) {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var container = document.querySelector('.editor-panes');
    var rect = container.getBoundingClientRect();
    var offset = rect.right - e.clientX;
    var percent = (offset / rect.width) * 100;
    percent = Math.max(20, Math.min(80, percent));
    inputPane.style.flex = 'none';
    inputPane.style.width = percent + '%';
    previewPane.style.flex = 'none';
    previewPane.style.width = (100 - percent) + '%';
  });
  document.addEventListener('mouseup', function() {
    if (dragging) {
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // === Modals ===
  var REPO = 'roko-tech/roko-tech.github.io';
  var TOKEN_KEY = 'roko-editor-gh-token';

  window.openModal = function(id) {
    document.getElementById(id).classList.add('active');
  };
  window.closeModal = function(id) {
    document.getElementById(id).classList.remove('active');
  };

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  });
  // Close modals on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.active').forEach(function(m) {
        m.classList.remove('active');
      });
    }
  });

  // === Settings ===
  window.updateTokenStatus = function() {
    var token = localStorage.getItem(TOKEN_KEY);
    var container = document.getElementById('token-status-display');
    if (token) {
      container.innerHTML = '<div class="token-status connected"><span class="token-dot"></span>متصل — التوكن محفوظ (' + token.substring(0, 7) + '...)<button class="token-remove" onclick="removeToken()">حذف</button></div>';
      document.getElementById('settings-token').value = '';
      document.getElementById('settings-token').placeholder = 'التوكن محفوظ — أدخل توكن جديد للاستبدال';
    } else {
      container.innerHTML = '<div class="token-status disconnected"><span class="token-dot"></span>غير متصل — أدخل GitHub Token للنشر</div>';
      document.getElementById('settings-token').placeholder = 'ghp_xxxxxxxxxxxx';
    }
  };

  window.removeToken = function() {
    localStorage.removeItem(TOKEN_KEY);
    updateTokenStatus();
    showToast('تم حذف التوكن');
  };

  window.saveSettings = function() {
    var tokenInput = document.getElementById('settings-token');
    var token = tokenInput.value.trim();
    if (token) {
      localStorage.setItem(TOKEN_KEY, token);
      tokenInput.value = '';
      showToast('تم حفظ التوكن');
    }
    updateTokenStatus();
    closeModal('settings-modal');
  };

  // === Publish ===
  function slugify(text) {
    return text
      .replace(/[^\u0621-\u064Aa-zA-Z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .substring(0, 80);
  }

  window.openPublishModal = function() {
    var token = localStorage.getItem(TOKEN_KEY);
    var warning = document.getElementById('publish-token-warning');
    var btn = document.getElementById('publish-btn');
    if (!token) {
      warning.style.display = 'block';
      btn.disabled = true;
    } else {
      warning.style.display = 'none';
      btn.disabled = false;
    }
    openModal('publish-modal');
    document.getElementById('publish-title').focus();
  };

  window.publishPost = function() {
    var token = localStorage.getItem(TOKEN_KEY);
    if (!token) { showToast('يجب إعداد GitHub Token أولاً'); return; }

    var title = document.getElementById('publish-title').value.trim();
    if (!title) { showToast('العنوان مطلوب'); return; }

    var desc = document.getElementById('publish-desc').value.trim();
    var tags = document.getElementById('publish-tags').value.trim();
    var content = input.value;

    if (!content.trim()) { showToast('المقالة فارغة'); return; }

    var btn = document.getElementById('publish-btn');
    btn.disabled = true;
    btn.textContent = 'جارٍ النشر...';

    // Build front matter
    var frontMatter = '---\n';
    frontMatter += 'title: "' + title.replace(/"/g, '\\"') + '"\n';
    frontMatter += 'layout: post\n';
    if (desc) frontMatter += 'description: "' + desc.replace(/"/g, '\\"') + '"\n';
    if (tags) {
      var tagList = tags.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      frontMatter += 'tags: [' + tagList.map(function(t) { return '"' + t + '"'; }).join(', ') + ']\n';
    }
    frontMatter += '---\n\n';

    var fullContent = frontMatter + content;

    // Build filename: YYYY-MM-DD-slug.md
    var now = new Date();
    var dateStr = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0');
    var slug = slugify(title) || 'post';
    var filename = '_posts/' + dateStr + '-' + slug + '.md';

    // GitHub API: create file
    fetch('https://api.github.com/repos/' + REPO + '/contents/' + encodeURIComponent(filename), {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        message: 'نشر مقالة: ' + title,
        content: btoa(unescape(encodeURIComponent(fullContent)))
      })
    })
    .then(function(res) {
      if (!res.ok) return res.json().then(function(err) { throw new Error(err.message || 'فشل النشر'); });
      return res.json();
    })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = 'نشر الآن';
      closeModal('publish-modal');
      showToast('تم النشر بنجاح! سيظهر المقال خلال دقائق');
      // Clear form
      document.getElementById('publish-title').value = '';
      document.getElementById('publish-desc').value = '';
      document.getElementById('publish-tags').value = '';
      // Clear editor
      input.value = '';
      renderPreview();
      localStorage.removeItem(STORAGE_KEY);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'نشر الآن';
      showToast('خطأ: ' + err.message);
    });
  };

  // === Mobile tabs ===
  window.switchTab = function(tab) {
    document.getElementById('tab-editor').classList.toggle('active', tab === 'editor');
    document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
    inputPane.classList.toggle('hidden', tab !== 'editor');
    previewPane.classList.toggle('hidden', tab !== 'preview');
    if (tab === 'preview') renderPreview();
  };

  // === Init ===
  loadContent();
})();
</script>
